name: Build RunCat

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (unsigned/ad-hoc)
        run: |
          xcodebuild -project "Menubar RunCat.xcodeproj" \
            -scheme "Menubar RunCat" \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

      - name: Zip app
        run: |
          cd build/Build/Products/Release
          zip -r MenubarRunCat.zip "Menubar RunCat.app"

      - uses: actions/upload-artifact@v4
        with:
          name: MenubarRunCat
          path: build/Build/Products/Release/MenubarRunCat.zip
